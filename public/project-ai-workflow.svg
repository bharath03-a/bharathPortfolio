<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow project visual</title>
  <desc id="desc">A simple AI workflow with inputs, model reasoning, validation, and generated output.</desc>
  <rect width="1200" height="750" fill="#f8fafc"/>
  <rect x="80" y="80" width="1040" height="590" rx="26" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="120" y="150" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">AI Workflow</text>
  <text x="122" y="196" fill="#4b5563" font-family="Inter, Arial, sans-serif" font-size="26">Structured inputs, model reasoning, and validated output</text>
  <g stroke="#64748b" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M310 375 H465"/>
    <path d="M625 375 H780"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="135" y="285" width="190" height="180" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="230" y="360" fill="#1e3a8a" font-size="30" font-weight="800">Input</text>
    <text x="230" y="400" fill="#1d4ed8" font-size="21">requirements</text>
    <rect x="465" y="255" width="180" height="240" rx="28" fill="#111827"/>
    <circle cx="555" cy="345" r="42" fill="#a78bfa"/>
    <circle cx="522" cy="405" r="24" fill="#38bdf8"/>
    <circle cx="592" cy="405" r="24" fill="#22c55e"/>
    <text x="555" y="465" fill="#f8fafc" font-size="26" font-weight="800">LLM</text>
    <rect x="780" y="285" width="250" height="180" rx="22" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="905" y="360" fill="#14532d" font-size="30" font-weight="800">Output</text>
    <text x="905" y="400" fill="#166534" font-size="21">validated JSON</text>
  </g>
  <g fill="#f1f5f9" stroke="#cbd5e1">
    <rect x="185" y="560" width="155" height="48" rx="10"/>
    <rect x="365" y="560" width="155" height="48" rx="10"/>
    <rect x="545" y="560" width="155" height="48" rx="10"/>
    <rect x="725" y="560" width="155" height="48" rx="10"/>
  </g>
  <g fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">
    <text x="224" y="591">Python</text>
    <text x="404" y="591">LLMs</text>
    <text x="584" y="591">API</text>
    <text x="764" y="591">Testing</text>
  </g>
</svg>
