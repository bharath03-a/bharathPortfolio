<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">GitCortex project visual</title>
  <desc id="desc">GitCortex logo with a simple code graph product summary.</desc>
  <rect width="1200" height="750" fill="#0b1120"/>
  <rect x="74" y="74" width="1052" height="602" rx="30" fill="#111827" stroke="#334155" stroke-width="2"/>
  <g transform="translate(190, 120) scale(2.28)">
    <line x1="10" y1="24" x2="42" y2="44" stroke="#cc785c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="24" x2="26" y2="72" stroke="#cc785c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="42" y1="44" x2="26" y2="72" stroke="#cc785c" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <circle cx="10" cy="24" r="9" fill="#cc785c"/>
    <circle cx="42" cy="44" r="7" fill="#e0a07f"/>
    <circle cx="26" cy="72" r="7" fill="#e0a07f"/>
    <text x="64" y="66"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-1">GitCortex</text>
  </g>
  <text x="212" y="345" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="30">
    Branch-aware code knowledge graph for Git repositories
  </text>
  <g fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round">
    <path d="M245 470 C360 390 475 390 590 470 S820 550 960 420"/>
    <path d="M245 470 C370 535 500 530 625 475 S815 350 960 420"/>
  </g>
  <g>
    <circle cx="245" cy="470" r="28" fill="#cc785c"/>
    <circle cx="590" cy="470" r="26" fill="#38bdf8"/>
    <circle cx="625" cy="475" r="22" fill="#e0a07f"/>
    <circle cx="960" cy="420" r="30" fill="#f8fafc"/>
  </g>
  <g fill="#1e293b" stroke="#475569">
    <rect x="212" y="575" width="165" height="52" rx="10"/>
    <rect x="402" y="575" width="165" height="52" rx="10"/>
    <rect x="592" y="575" width="165" height="52" rx="10"/>
    <rect x="782" y="575" width="205" height="52" rx="10"/>
  </g>
  <g fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
    <text x="254" y="609">Rust</text>
    <text x="441" y="609">MCP</text>
    <text x="626" y="609">KuzuDB</text>
    <text x="818" y="609">tree-sitter</text>
